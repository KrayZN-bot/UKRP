<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Studios Launch Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

/* Background */
.background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("background.png") center/cover no-repeat;
    filter: blur(6px);
    transform: scale(1.1);
    z-index:-2;
}

/* Dark overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* Top Right Logo */
.top-right-logo {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 67px; /* adjust as needed */
    height: auto;
    z-index: 3; /* above background and overlay */
}

/* Main content */
.container{
    text-align:center;
    z-index:2;
}

h1{
    font-size:48px;
    margin-bottom:20px;
    letter-spacing:2px;
}

.countdown{
    font-size:64px;
    font-weight:bold;
    letter-spacing:3px;
}

.label{
    margin-top:10px;
    font-size:16px;
    opacity:0.8;
}

.footer{
    position:fixed;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- Top Right Logo -->
<img src="logo.png" alt="Atlas Studios Logo" class="top-right-logo">

<div class="container">
    <h1>Atlas Studios Server Launch</h1>
    <div class="countdown" id="countdown">Loading...</div>
    <div class="label">Until April 12 • 17:00</div>
</div>

<div class="footer">
    Atlas Studios | ©2026
</div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");
music.volume = 0.5;

// Start music when user clicks anywhere
document.body.addEventListener("click", function(){
    music.play();
}, { once: true });
</script>

<script>
const launchDate = new Date("April 12, 2026 17:00:00 GMT+0100").getTime();

const timer = setInterval(function(){

    const now = new Date().getTime();
    const distance = launchDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s";

    if(distance < 0){
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "SERVER IS LIVE";
    }

},1000);
</script>

</body>
</html>
