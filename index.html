```html
<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Studios Launch Countdown</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* Background */
.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("background.png") center/cover no-repeat;
filter: blur(6px);
transform: scale(1.1);
z-index:-3;
}

/* Dark overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-2;
}

/* Emergency Lights */
.lights{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.light{
position:absolute;
width:700px;
height:700px;
border-radius:50%;
opacity:0;
}

.red{
left:-200px;
top:30%;
background:radial-gradient(circle, rgba(255,0,0,0.5) 0%, rgba(255,0,0,0) 70%);
animation:redFlash 3s infinite;
}

.blue{
right:-200px;
top:30%;
background:radial-gradient(circle, rgba(0,120,255,0.5) 0%, rgba(0,120,255,0) 70%);
animation:blueFlash 3s infinite;
}

@keyframes redFlash{
0%{opacity:0}
10%{opacity:.9}
20%{opacity:0}
30%{opacity:.9}
40%{opacity:0}
100%{opacity:0}
}

@keyframes blueFlash{
50%{opacity:0}
60%{opacity:.9}
70%{opacity:0}
80%{opacity:.9}
90%{opacity:0}
100%{opacity:0}
}

/* Main content */
.container{
text-align:center;
position:relative;
z-index:2;
}

h1{
font-size:48px;
margin-bottom:20px;
letter-spacing:2px;
}

.countdown{
font-size:64px;
font-weight:bold;
letter-spacing:3px;
}

.label{
margin-top:10px;
font-size:16px;
opacity:0.8;
}

.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:14px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="lights">
<div class="light red"></div>
<div class="light blue"></div>
</div>

<div class="container">
<h1>Atlas Studios Server Launch</h1>
<div class="countdown" id="countdown">Loading...</div>
<div class="label">Until April 12 • 17:00</div>
</div>

<div class="footer">
UKRP Community
</div>

<script>
const launchDate = new Date("April 12, 2026 17:00:00 GMT+0100").getTime();

const timer = setInterval(function(){

const now = new Date().getTime();
const distance = launchDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s";

if(distance < 0){
clearInterval(timer);
document.getElementById("countdown").innerHTML = "SERVER IS LIVE";
}

},1000);
</script>

</body>
</html>
```
